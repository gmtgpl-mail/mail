Izreal nielegalnie przechwycił łodzie Globalnej Flotylli Sumud (dalej: Flotylli), transportujące pomoc humanitarną do Strefy Gazy. Incydent ten, podczas którego było słychać strzały, miał miejsce na wodach międzynarodowych 18 i 19 maja br. Część łodzi płynęła pod polską banderą — na ich pokładach znajdowali się obywatele Rzeczypospolitej Polskiej: Agata Wisłocka oraz Łukasz Kozak. Domagam się od Sejmu RP natychmiastowej reakcji.

Polska, według oświadczenia Ministerstwa Spraw Zagranicznych z 1 kwietnia 2026 rok,u uznaje za całkowicie niedopuszczalne stosowanie kary śmierci, które można by uznać za dyskryminujące wobec osób określonej narodowości.

Rządy i instytucje międzynarodowe nie podejmują wystarczających działań, by powstrzymać łamanie prawa międzynarodowego oraz izraelskie przemoc, okrucieństwo i bezwzględność wobec Palestyńczyków. Ludobójstwo i nielegalna okupacja muszą zostać natychmiast zakończone. Niezbędne są sankcje oraz presja ekonomiczna, polityczna i dyplomatyczna.
