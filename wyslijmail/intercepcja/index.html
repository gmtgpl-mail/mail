`18 maja Izreal nielegalnie przechwycił łodzie Globalnej Flotylli Sumud, przewożące pomoc humanitarną do Strefy Gazy. Incydent ten miał miejsce na wodach międzynarodowych, część łodzi płynęła pod polską banderą. Na pokładzie znajdowali się obywatele Rzeczpospolitej: Agata Wisłocka oraz Łukasz Kozak. Domagam się od Parlamentu Europejskiego natychmiestowej reakcji. 

Ludobójstwo trwa
Od ponad 30 miesięcy Strefa Gazy jest miejscem ludobójstwa. 
Tak orzekł Międzynarodowy Trybunał Sprawiedliwości, tak oceniają to eksperci ONZ, międzynarodowe organizacje praw człowieka, a także czołowi badacze ludobójstwa i historii Holokaustu.
“Zawieszenie broni” z 10 października 2025 roku jest fikcją. Odkąd je podpisano, nie było ani jednego dnia, w którym na domy, szpitale, insfrastrukturę krytyczną i na głowy Palestyńczyków w Gazie nie leciały izraelskie bomby - zginęło co najmniej 723 Palestyńczyków, a kolejnych 1990 zostało rannych. Ustalenia dotyczące dostaw pomocy humanitarnej nie są respektowane. Siły okupacyjne wedle własnego uznania limitują jej przepływ do absolutnego minimum lub blokują go całkowicie. Według danych WHO 46% leków pierwszej potrzeby i 66% materiałów medycznych jest obecnie niedostępnych. Ludzie umierają i głodują, podczas gdy tony pomocy humanitarnej czekają w ciężarówkach na zablokowanej granicy.
Rządy i instytucje międzynarodowe, w tym Unia Europejska, nie podejmują wystarczających działań, by powstrzymać łamanie prawa międzynarodowego oraz izraelską przemoc, okrucieństwo i bezwzględność wobec Palestyńczyków. 

Flotylla odpowiada na bezczynność
Dlatego 12 kwietnia pierwsze łodzie Globalnej Flotylli Sumud wypłynęły z portu w Barcelonie, później też z Sycylii i Marmaris, razem tworząc flotyllę złożoną z ponad 70 statków i ponad 1000 aktywistów z ponad 40 krajów - w tym z Polski. W misji biorą udział eksperci z branży medycznej, edukacyjnej i budowlanej. Wraz z nimi płyną dziennikarze, by udokumentować izraelskie zbrodnie oraz aktywiści z przekroju całego społeczeństwa.
Drogą lądową wyruszył także konwój humanitarny w stronę egipskiego przejścia granicznego z Gazą w Rafah. Tak jak w poprzednim roku, w Globalnej Flotylli Sumud oraz w Globalnym Specjalistycznym Konwoju Pomocowym Sumud bierze udział polska delegacja, którą organizuje Global Sumud Polska.
Już wcześniej, 30 kwietnia 2026 roku izraelscy żołnierze przechwycili statki Flotylli na wodach międzynarodowych nieopodal Krety i porwali jej uczestników, w tym Polkę - Magdalenę Górską. Stanowiło to jawne złamanie IV Konwencji Genewskiej i Konwencji UNCLOS. Według zeznań zatrzymanych - potwierdzonych przez Amnesty International - podczas przetrzymywania byli oni torturowani przez izraelskich strażników. Po kilku dniach Izrael uwolnił aktywistów, poza dwoma liderami ruchu - Thiago Avilą i Saifem Abukeshekiem, którzy dopiero po niespełna tygodniu, pełnego tortur i brutalności, zostali uwolnieni.

Teraz, pokojowa humanitarna flotylla została nielegalnie przechwycona raz jeszcze. 
 
Zarówno w 2025, jak i w czasie aktualnie trwającej misji, w Polsce odbyły się masowe demonstracje, których uczestnicy domagali się stanowczych działań ekonomicznych i politycznych wobec Izraela w celu powstrzymania ludobójstwa, wyrażali solidarność z Flotyllą oraz wzywali do natychmiastowego uwolnienia zatrzymanych. 
Wsparcie tej misji z pomocą humanitarną jest obowiązkiem wszystkich tych, którym zależy na prawie międzynarodowym, solidarności międzyludzkiej oraz niezgodzie na zbrodnie przeciw ludzkości i ludobójstwu. Taki obowiązek spoczywa w szczególności na wybranych przez społeczeństwo reprezentantach narodu w Parlamencie Europejskim. Posłowie i Posłanki na Parlament Europejski powinni wesprzeć misję Flotylli i Palestyńczyków w ich dążeniu do życia w wolności, godności i bezpieczeństwie. `
