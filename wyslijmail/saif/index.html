We write to you with utmost urgency to draw your attention to a grave violation of international law and fundamental human rights, directly affecting a Swedish national, Mr Saif Abukeshek.

On the 30th of April, Mr Abukeshek - a citizen of Sweden and Spain, both EU states - was seized by Israeli military forces while aboard a civilian vessel sailing on international waters near Crete. He was sailing with Global Sumud Flotilla - a peaceful civilian mission seeking to create a humanitarian maritime corridor, deliver humanitarian aid to the population of Gaza and support Palestinian drive for freedom, dignity, safety and their homeland's independence. 

The interception of the vessel in international waters constitutes a direct violation of the United Nations Convention on the Law of the Sea and fundamental principles of international law. While no state exercises jurisdiction over international waters, every state is nonetheless bound to uphold international law - an obligation owed to humanity as a whole.

Of the approximately 180 activists seized by Israel, nearly all were eventually transferred to Crete - many reporting physical mistreatment during their detention. The exceptions were two of the Flotilla's leaders: Mr Saif Abukeshek and Mr Thiago Ávila, a Brazilian national. Both are currently held at Shikma Prison in Ashkelon, a facility with a well-documented record of mistreatment of detainees. Their detention has been extended until the 5th of May, without any formal charges having been brought against either of them.

We wish to bring the following facts to your particular attention:

    The interception took place in international waters, which Israel has no jurisdiction over, in contravention of established international law;

    Mr Abukeshek holds Swedish and Spanish citizenship and has no legal nexus with the State of Israel;

    Credible information, confirmed through diplomatic and legal channels, indicates that both detainees have been subjected to serious physical and psychological mistreatment and torture, as well as denial of adequate medical care;

    No formal indictment has been issued, rendering their continued detention arbitrary and without any legal basis under international human rights law.


We must also draw your attention to a circumstance of particular gravity, which is that Mr Abukeshek is of Palestinian origin. We are concerned about his life, since recent amendments to Israeli law have introduced provisions permitting the application of capital punishment - by hanging - in a manner that applies exclusively to Palestinians.
Both Brazil and Spain have already initiated active diplomatic measures towards ensuring the safety of their respective nationals. We express our deep concern at the apparent absence of equivalent action on the part of Sweden to date.

In this context, we respectfully but urgently call upon you, as a representative of the Kingdom of Sweden, to advocate for the following measures by the Swedish government:

    Immediate diplomatic intervention to secure the unconditional release of Mr Saif Abukeshek;

    Provision of full consular and diplomatic protection to ensure Mr Abukeshek is able to exercise his rights under international law;

    An independent investigation into the circumstances of the interception of civilian vessels carrying humanitarian aid in international waters;

    Imposition of meaningful economic sanctions in response to ongoing violations of international law by Israel;

    A formal demand for accountability for the unlawful interception of Global Sumud Flotilla's civilian vessel, as well as for all crimes committed against the Palestinian people, including acts that constitute genocide in Gaza and systematic ethnic cleansing in the West Bank.


We wish to be clear that the situation we have described does not arise in isolation. The detention of Mr Abukeshek and Mr Ávila is just one dimension of what is happening to Palestinians across generations - since they were ethnically cleansed from their homeland, their villages, their cities during the Nakba of 1948. Violence is ongoing and has again dramatically escalated in recent months.

Our hearts are with Saif and Thiago, but also with over 9,600 Palestinians (including approximately 85 women and 350 children) held in Israeli prisons and detention centres, where they are vulnerable to torture and mistreatment as reported by independent human rights organisations. More than 3,500 of those imprisoned are held without any charge or trial. We cannot and will not forget them.

We trust that Sweden will confirm its commitment to international law and human rights by acting decisively and standing unequivocally on the side of the universal values of freedom, equality and the right to safety for all people, irrespective of their origin.`],
